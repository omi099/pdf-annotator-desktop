name: Build Apex Annotator (WebView2)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate Codebase
        shell: bash
        run: |
          chmod +x generate_wpf_app.sh
          ./generate_wpf_app.sh

      - name: Compile Native Application Folder
        working-directory: ./TeachingAnnotator
        run: >
          dotnet publish 
          -c Release 
          -r win-x64 
          --self-contained true

      - name: Upload Application Folder
        uses: actions/upload-artifact@v4
        with:
          name: Apex-Teaching-Annotator
          # CRITICAL FIX: The path now matches the net8.0-windows target framework
          path: TeachingAnnotator/bin/Release/net8.0-windows/win-x64/publish/

name: Build Apex Custom Annotator

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate Codebase
        shell: bash
        run: |
          chmod +x generate_wpf_app.sh
          ./generate_wpf_app.sh

      - name: Compile Application to Hardcoded Folder
        working-directory: ./TeachingAnnotator
        # The '-o ./Final_Build' guarantees the folder path for the artifact upload.
        run: >
          dotnet publish 
          -c Release 
          -r win-x64 
          --self-contained true 
          -o ./Final_Build

      - name: Upload Application Folder
        uses: actions/upload-artifact@v4
        with:
          name: Apex-Teaching-Annotator-Custom
          # Grabbing the exact hardcoded folder
          path: TeachingAnnotator/Final_Build/

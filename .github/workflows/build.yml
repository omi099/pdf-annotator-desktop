name: The SSH Hijack Pipeline

on:
  workflow_dispatch: # Allows you to manually click a button to start the server

jobs:
  build-and-hijack:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate Base Codebase
        shell: bash
        run: |
          chmod +x generate_wpf_app.sh
          ./generate_wpf_app.sh

      # 🛑 THE HIJACK: This pauses the workflow and prints an SSH connection string!
      - name: Open SSH Terminal via tmate
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true # Only you can log in

      # ⬇️ GitHub waits here. It will NOT run these next steps until you type 'exit' in your SSH terminal.

      - name: Compile Application
        working-directory: ./TeachingAnnotator
        run: >
          dotnet publish 
          -c Release 
          -r win-x64 
          --self-contained true 
          -o ./Final_Build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Apex-Annotator-Custom-Build
          path: TeachingAnnotator/Final_Build/

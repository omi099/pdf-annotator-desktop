name: Build Native WPF Annotator

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Generate Codebase
        shell: bash
        run: |
          # Rename this to whatever your script is named
          chmod +x generate_wpf_app.sh
          ./generate_wpf_app.sh

      - name: Compile Single File Executable
        working-directory: ./TeachingAnnotator
        # -r win-x64 targeting 64-bit PCs
        # --self-contained true bundles everything so the user doesn't need to install anything
        # -p:PublishSingleFile=true crushes everything down into ONE clean .exe file!
        run: >
          dotnet publish 
          -c Release 
          -r win-x64 
          --self-contained true 
          -p:PublishSingleFile=true

      - name: Upload Single Native EXE
        uses: actions/upload-artifact@v4
        with:
          name: Apex-Teaching-Annotator-EXE
          # Grabbing ONLY the single compiled .exe file
          path: TeachingAnnotator/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish/TeachingAnnotator.exe

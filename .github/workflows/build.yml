name: Build Teaching PDF Annotator (Windows)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Tauri Dependencies (Windows)
        run: |
          # WebView2 is usually pre-installed on windows-latest, but ensuring core tools are present
          cargo install tauri-cli --version "^1.5.0"

      - name: Run Bash Generator Script
        shell: bash
        run: |
          chmod +x generate_app.sh
          ./generate_app.sh

      - name: Install NPM Dependencies
        working-directory: ./annotator-app
        run: npm install

      - name: Build Tauri App
        working-directory: ./annotator-app
        run: npm run tauri build

      - name: Upload Windows EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Teaching-Annotator-Windows
          path: annotator-app/src-tauri/target/release/bundle/msi/*.msi # Tauri outputs MSI by default for Windows

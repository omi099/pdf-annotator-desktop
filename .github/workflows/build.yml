name: Build Ultimate Native WinUI 3 App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows-native:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 1. RUN BASH GENERATOR
      - name: Generate Native Codebase
        shell: bash
        run: |
          chmod +x generate_winui_app.sh
          ./generate_winui_app.sh

      # 2. RESTORE DEPENDENCIES
      - name: Restore NuGet Packages
        working-directory: ./TeachingAnnotator
        run: dotnet restore

      # 3. COMPILE STANDALONE EXECUTABLE
      # Fixed the RID target to win-x64 instead of win10-x64
      - name: Compile and Publish Native EXE
        working-directory: ./TeachingAnnotator
        run: >
          dotnet publish 
          -c Release 
          -r win-x64 
          --self-contained true 
          -p:WindowsPackageType=None 
          -p:WindowsAppSDKSelfContained=true

      # 4. UPLOAD ARTIFACT
      # Adjusted output path to match the new RID
      - name: Upload Native Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: Apex-Teaching-Annotator-Windows
          path: TeachingAnnotator/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish/

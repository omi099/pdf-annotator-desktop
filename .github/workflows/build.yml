name: Build Teaching PDF Annotator (Windows)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # 1. RUN BASH SCRIPT FIRST
      # We must create the files so the cache action has something to lock onto.
      - name: Run Bash Generator Script
        shell: bash
        run: |
          chmod +x generate_app.sh
          ./generate_app.sh

      # 2. EXPLICIT NPM CACHE
      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('annotator-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 3. BULLETPROOF RUST CACHE
      # We use a static shared-key here so it NEVER misses the cache, 
      # even if the bash script generates slightly different file timestamps.
      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "annotator-app/src-tauri -> target"
          shared-key: "tauri-windows-cache-v1"

      # 4. INSTALL & BUILD
      - name: Install NPM Dependencies
        working-directory: ./annotator-app
        run: npm install

      - name: Build Tauri App
        working-directory: ./annotator-app
        run: npx tauri build

      # 5. UPLOAD ARTIFACT
      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Teaching-Annotator-Windows
          path: |
            annotator-app/src-tauri/target/release/bundle/msi/*.msi
            annotator-app/src-tauri/target/release/bundle/nsis/*.exe
